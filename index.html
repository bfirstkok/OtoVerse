<!doctype html>
<html lang="th" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="🎮 OtoVerse - เว็บทายเพลงอนิเมะจากเพลง OP/ED สุดมันส์! เลือกแนว เลือกโหมด แล้วเด้งเข้าเล่นเกม" />
    <meta name="keywords" content="anime, quiz, opening, theme song, game, interactive" />
    <link rel="canonical" href="https://otoverse.web.app/" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:title" content="OtoVerse 🎵" />
    <meta property="og:description" content="เว็บทายเพลงอนิเมะจากเพลง OP/ED" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://otoverse.web.app/" />
    <link rel="icon" href="/favicon.ico?v=3" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon-32.png?v=3" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16.png?v=3" sizes="16x16" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" sizes="180x180" />
    <link rel="manifest" href="/manifest.webmanifest?v=3" />
    <script>
      (function () {
        try {
          var s = window.history && window.history.state;
          var page = s && s.__app === "anime-op-quiz" && typeof s.page === "string" ? s.page : "home";

          if (page === "home") {
            // Start fetching ASAP (mobile-friendly) and apply CSS variable early.
            var link = document.createElement("link");
            link.rel = "preload";
            link.as = "image";
            link.href = "/backg.gif";
            link.type = "image/gif";
            link.setAttribute("fetchpriority", "high");
            document.head.appendChild(link);

            document.documentElement.style.setProperty("--bg-gif", 'url("/backg.gif")');
          } else {
            document.documentElement.style.setProperty("--bg-gif", "none");
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>
    <title>OtoVerse - ทายเพลงอนิเมะ</title>
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
